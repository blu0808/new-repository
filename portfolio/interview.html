  <script src="script.js"></script>
  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    const chapters = document.querySelectorAll('.iv-chapter');
    function resetChapters() {
      chapters.forEach(c => {
        c.style.scrollSnapType = 'none';
        c.style.webkitOverflowScrolling = 'auto';
        c.scrollLeft = 0;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          c.style.scrollSnapType = '';
          c.style.webkitOverflowScrolling = '';
        }));
      });
    }
    document.addEventListener('DOMContentLoaded', resetChapters);
    window.addEventListener('load', resetChapters);
    window.addEventListener('pageshow', () => setTimeout(resetChapters, 150));
    window.addEventListener('load', () => {
      const first = chapters[0];
      const wrap = first?.closest('.iv-chapter-wrap');
      if (!first || !wrap) return;
      const hint = document.createElement('div');
      hint.className = 'iv-scroll-hint';
      first.appendChild(hint);
      setTimeout(() => {
        hint.classList.add('show');
        const hide = () => {
          hint.classList.remove('show');
          setTimeout(() => hint.remove(), 400);
          first.removeEventListener('scroll', hide);
        };
        first.addEventListener('scroll', hide, { once: true });
        setTimeout(hide, 2500);
      }, 900);
    });
    chapters.forEach(chapter => {
      const wrap = chapter.closest('.iv-chapter-wrap');
      const thumb = wrap.querySelector('.iv-progress-thumb');
      const imgCount = chapter.querySelectorAll('.iv-img').length;

      const label = wrap.querySelector('.iv-label');
      const header = document.createElement('div');
      header.className = 'iv-chapter-header';
      label.parentNode.insertBefore(header, label);
      header.appendChild(label);
      const counter = document.createElement('span');
      counter.className = 'iv-counter';
      counter.textContent = `1 / ${imgCount}`;
      header.appendChild(counter);

      function updateProgress() {
        const max = chapter.scrollWidth - chapter.clientWidth;
        if (max <= 0) return;
        const ratio = chapter.scrollLeft / max;
        thumb.style.width = Math.max(8, ratio * 100) + '%';
        const cur = Math.min(Math.round(chapter.scrollLeft / chapter.clientWidth) + 1, imgCount);
        counter.textContent = `${cur} / ${imgCount}`;
      }
      chapter.addEventListener('scroll', updateProgress);
      updateProgress();

      let isDragging = false, startX = 0, scrollLeft = 0;
      chapter.addEventListener('mousedown', e => {
        isDragging = true;
        chapter.classList.add('dragging');
        startX = e.pageX;
        scrollLeft = chapter.scrollLeft;
        e.preventDefault();
      });
      document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        chapter.classList.remove('dragging');
      });
      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        chapter.scrollLeft = scrollLeft - (e.pageX - startX);
      });
    });
  </script>
