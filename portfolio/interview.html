  <script src="script.js"></script>
  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    const chapters = document.querySelectorAll('.iv-chapter');
    function resetChapters() { chapters.forEach(c => { c.scrollLeft = 0; }); }
    document.addEventListener('DOMContentLoaded', resetChapters);
    window.addEventListener('load', resetChapters);
    window.addEventListener('pageshow', resetChapters);
    chapters.forEach(chapter => {
      const thumb = chapter.closest('.iv-chapter-wrap').querySelector('.iv-progress-thumb');

      function updateProgress() {
        const max = chapter.scrollWidth - chapter.clientWidth;
        if (max <= 0) return;
        const ratio = chapter.scrollLeft / max;
        thumb.style.width = Math.max(8, ratio * 100) + '%';
      }
      chapter.addEventListener('scroll', updateProgress);
      updateProgress();

      let isDragging = false, startX = 0, scrollLeft = 0;
      chapter.addEventListener('mousedown', e => {
        isDragging = true;
        chapter.classList.add('dragging');
        startX = e.pageX;
        scrollLeft = chapter.scrollLeft;
        e.preventDefault();
      });
      document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        chapter.classList.remove('dragging');
      });
      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        chapter.scrollLeft = scrollLeft - (e.pageX - startX);
      });
    });
  </script>
