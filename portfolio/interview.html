  <!-- ─── EMAIL PANEL ──────────────────────────────────────── -->
  <div class="email-panel" id="emailPanel" aria-hidden="true">
    <div class="ep-backdrop" id="epBackdrop"></div>
    <div class="ep-drawer" role="dialog" aria-modal="true" aria-label="이메일 보내기">
      <div class="ep-row">
        <span class="ep-label">To:</span>
        <span class="ep-val">CHIGI</span>
      </div>
      <div class="ep-row">
        <span class="ep-label">From:</span>
        <input type="email" id="epFrom" class="ep-input" placeholder="Enter Your Email Address" autocomplete="email">
      </div>
      <div class="ep-row ep-row--msg">
        <span class="ep-label">Message:</span>
        <textarea id="epMessage" class="ep-textarea"></textarea>
      </div>
      <div class="ep-actions" id="epActions">
        <button class="ep-btn ep-btn--send" id="epSend">Send Email</button>
        <button class="ep-btn ep-btn--cancel" id="epCancel">Cancel</button>
      </div>
      <div class="ep-confirm" id="epConfirm">
        <span class="ep-confirm-msg">정말 보낼까요?</span>
        <div class="ep-confirm-btns">
          <button class="ep-btn ep-btn--send" id="epConfirmSend">보내기</button>
          <button class="ep-btn ep-btn--cancel" id="epConfirmBack">취소</button>
        </div>
      </div>
      <p class="ep-status" id="epStatus"></p>
