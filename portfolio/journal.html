  <script src="script.js"></script>
  <script>
    /* ─── Journal Carousel ──────────────────────────────────── */
    document.querySelectorAll('.jc-wrap').forEach(wrap => {
      const track = wrap.querySelector('.jc-track');
      const imgs  = track.querySelectorAll('img');
      const dotsWrap = wrap.querySelector('.jc-dots');
      let cur = 0;

      if (dotsWrap) {
        imgs.forEach((_, i) => {
          const d = document.createElement('span');
          d.className = 'jc-dot' + (i === 0 ? ' active' : '');
          d.addEventListener('click', () => go(i));
          dotsWrap.appendChild(d);
        });
      }

      function go(n) {
        cur = ((n % imgs.length) + imgs.length) % imgs.length;
        track.style.transform = `translateX(-${cur * 100}%)`;
        if (dotsWrap) {
          dotsWrap.querySelectorAll('.jc-dot').forEach((d, i) =>
            d.classList.toggle('active', i === cur));
        }
      }

      let tx = 0, ty = 0, tDir = null;
      track.addEventListener('touchstart', e => {
        tx = e.touches[0].clientX; ty = e.touches[0].clientY; tDir = null;
      }, { passive: true });
      track.addEventListener('touchmove', e => {
        if (!tDir) {
          const dx = Math.abs(e.touches[0].clientX - tx);
          const dy = Math.abs(e.touches[0].clientY - ty);
          if (dx > 4 || dy > 4) tDir = dx >= dy ? 'h' : 'v';
        }
        if (tDir === 'h') e.preventDefault();
      }, { passive: false });
      track.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (tDir === 'h' && Math.abs(dx) > 40) go(dx < 0 ? cur + 1 : cur - 1);
      });
    });
  </script>
