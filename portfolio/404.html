<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHIGI — 페이지를 찾을 수 없습니다</title>
  <link rel="icon" href="images/favicon4.png">
  <link rel="apple-touch-icon" href="images/favicon4.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #1A4DFF; --font: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
    body {
      font-family: var(--font);
      background: #fff;
      color: #0A0A0A;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a { color: inherit; text-decoration: none; }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 32px;
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
    }

    .message { display: flex; flex-direction: column; gap: 12px; }

    .code {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--accent);
      line-height: 1;
    }

    .desc {
      font-size: .82rem;
      color: #666;
      line-height: 1.7;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--accent);
      background: none;
      border: 1.5px solid var(--accent);
      border-radius: 100px;
      padding: 10px 22px;
      cursor: pointer;
      transition: background .2s, color .2s;
      text-decoration: none;
    }
    .home-btn:hover {
      background: var(--accent);
      color: #fff;
    }
    .home-btn svg { flex-shrink: 0; transition: transform .2s; }
    .home-btn:hover svg { transform: translateX(-3px); }

    @media (max-width: 480px) {
      .wrap { padding: 40px 28px; }
      .code { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="message">
      <p class="code">404</p>
      <p class="desc">찾으시는 페이지가 없거나<br>주소가 잘못된 것 같아요.</p>
    </div>

    <a class="home-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9,2 4,7 9,12"/>
      </svg>
      홈으로 돌아가기
    </a>
  </div>
</body>
</html>
